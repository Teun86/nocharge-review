<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>No Charge – Awaiting Review</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #171c27; --border: #252d3d;
      --accent: #3b82f6; --accent-dim: #1e3a5f; --success: #22c55e;
      --text: #e2e8f0; --muted: #64748b;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; padding: 28px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .header-left h1 { font-family: var(--mono); font-size: 18px; font-weight: 600; }
    .badge { font-family: var(--mono); font-size: 11px; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; padding: 3px 10px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
    .btn { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .table-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface); border-bottom: 1px solid var(--border); }
    thead th { font-family: var(--mono); font-size: 11px; color: var(--muted); padding: 11px 14px; text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; vertical-align: middle; }
    .ticket-link { color: var(--accent); text-decoration: none; font-family: var(--mono); font-weight: 600; }
    .note-pill { display: inline-block; background: rgba(59,130,246,.12); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); border-radius: 4px; font-size: 11px; padding: 2px 8px; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-banner { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; padding: 12px 16px; margin-bottom: 16px; display: none; border-radius: 8px; }
    .approved-badge { color: var(--success); font-family: var(--mono); font-size: 11px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>No Charge Review</h1>
    <span style="color:var(--muted); font-size:12px;">Overzicht van uren op basis van Ticket Acties</span>
  </div>
  <div class="badge" id="statusBadge">● VERBINDING MAKEN</div>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="toolbar">
  <button class="btn btn-ghost" id="btnRefresh" onclick="loadData()">↻ Verversen</button>
  <span id="countLabel" style="margin-left:auto; color:var(--muted); font-family:var(--mono);"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Ticket</th>
        <th>Klant</th>
        <th>Agent</th>
        <th>Datum</th>
        <th>Tijd</th>
        <th>Toelichting</th>
        <th>Actie</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="7" style="text-align:center; padding:40px;"><div class="spinner"></div></td></tr>
    </tbody>
  </table>
</div>

<script>
const CFG = {
  baseUrl: 'https://alo-psa-proxy.teunscheepers.workers.dev',
  clientId: '6b8056f2-b63f-47fc-bfc2-d9b60dc440fa',
  clientSecret: 'ynZgNFks4IIx_DU93Z1P6Qdmrpzc_mxkGDT6h04W_dg'
};

let token = null;

async function getToken() {
  const res = await fetch(`${CFG.baseUrl}/auth/token`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=client_credentials&client_id=${CFG.clientId}&client_secret=${CFG.clientSecret}&scope=all`
  });
  const d = await res.json();
  return d.access_token;
}

async function api(path) {
  const t = await getToken();
  const res = await fetch(`${CFG.baseUrl}/api${path}`, {
    headers: { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' }
  });
  return res.json();
}

async function loadData() {
  document.getElementById('statusBadge').textContent = '● LADEN...';
  try {
    // We halen de tickets op met de filters die we in de netwerk-log zagen
    const data = await api('/Tickets?pending_review=true&per_action=true&page_size=50');
    const rows = Array.isArray(data) ? data : (data.tickets || []);
    
    renderTable(rows);
    document.getElementById('statusBadge').textContent = '● VERBONDEN';
    document.getElementById('statusBadge').style.color = '#22c55e';
    document.getElementById('countLabel').textContent = `${rows.length} items`;
  } catch (e) {
    document.getElementById('errorBanner').style.display = 'block';
    document.getElementById('errorBanner').textContent = 'Fout bij laden: ' + e.message;
  }
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = rows.map(r => {
    const actionId = r.action_id || r.id;
    
    // We proberen hier alle verdachte velden waar jouw tekst in kan staan
    // Hij pakt de eerste die niet leeg is.
    const toelichting = r.action_note || r.userdef1 || r.userdef2 || r.userdef3 || r.category_2 || r.summary || '—';
    
    return `
      <tr id="row-${actionId}">
        <td><a class="ticket-link" href="#">#${r.id}</a></td>
        <td>${r.client_name || '—'}</td>
        <td>${r.action_agent_name || '—'}</td>
        <td>${new Date(r.dateoccurred).toLocaleDateString('nl-NL')}</td>
        <td>${r.timetaken}m</td>
        <td><span class="note-pill" title="${toelichting}">${toelichting}</span></td>
        <td><button class="btn btn-primary" onclick="approve(${actionId})">✓</button></td>
      </tr>`;
  }).join('');
}

async function approve(id) {
  const t = await getToken();
  await fetch(`${CFG.baseUrl}/api/Actions`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' },
    body: JSON.stringify([{ id: id, reviewed: true }])
  });
  const row = document.getElementById(`row-${id}`);
  row.style.opacity = '0.3';
  row.querySelector('button').disabled = true;
  row.querySelector('button').textContent = 'OK';
}

loadData();
</script>
</body>
</html>
